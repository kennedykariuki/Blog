{% extends 'base.html' %}

{% block title %}
    Article page | {{ article.title }}
{% endblock %}

{% block content %}

    <div>
        <h4>{{ article_details.title }}</h4>
        {{ article_details.author.username }}
        <br>
        {{ article_details.body }}
        <br>
        <br>
        <span>
            <small>Created: {{ article_details.publication_date }}</small>
        </span>
    </div>

    <a href="{% url 'home' %}" class="btn btn-secondary">Back to Home</a>

{% endblock %}

{% extends 'base.html' %}

{% block content %}
<h3>Post</h3>

<ul>
        {% for post in object_list %}
        <li>
            <a href="{% url 'article_details' post.pk %}">{{ post.title }}</a> - {{ post.author.username }}
            <br>
            {{ post.body }}
        </li>
        {% endfor %}
</ul>
{% endblock %}
